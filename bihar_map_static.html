<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bihar Caste Violence — Spatial Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────────────────── */
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f8f9fa;
        color:#1e293b; height:100vh; display:flex; flex-direction:column; }

/* ── Header ───────────────────────────────────────────────────────── */
#hdr { background:#ffffff; border-bottom:1px solid #e2e8f0;
        padding:10px 20px; display:flex; align-items:center;
        gap:14px; flex-shrink:0; box-shadow:0 1px 3px rgba(0,0,0,.08); }
#hdr h1 { font-size:15px; font-weight:600; color:#0f172a; }
#hdr-count { font-size:12px; color:#64748b; margin-left:auto;
              background:#f1f5f9; padding:3px 10px; border-radius:12px; }

/* ── Controls bar ─────────────────────────────────────────────────── */
#ctrl { background:#ffffff; border-bottom:1px solid #e2e8f0;
         padding:8px 20px; display:flex; gap:20px; align-items:center;
         flex-wrap:wrap; flex-shrink:0; }
.ctrlg { display:flex; align-items:center; gap:8px; }
.ctrlg label { font-size:12px; color:#475569; white-space:nowrap; }
select { background:#f8fafc; border:1px solid #cbd5e1; border-radius:5px;
          color:#0f172a; font-size:12px; padding:4px 8px; outline:none;
          cursor:pointer; }
select:focus { border-color:#3b82f6; }
input[type=range] { width:120px; accent-color:#3b82f6; cursor:grab; }
.rv { font-size:12px; font-weight:600; color:#2563eb; min-width:32px; }
.ctrl-sep { width:1px; height:24px; background:#e2e8f0; }

/* ── Map ──────────────────────────────────────────────────────────── */
#map { flex:1; min-height:0; background:#f0f4f8; }

/* Make Leaflet tiles show a clean white/light base */
.leaflet-tile-pane { filter: saturate(0.15) brightness(1.08); }

/* ── Tooltip ──────────────────────────────────────────────────────── */
#tt { position:fixed; z-index:9999; background:#ffffff;
       border:1px solid #e2e8f0; border-radius:8px; padding:12px 14px;
       pointer-events:none; display:none; max-width:340px;
       box-shadow:0 4px 20px rgba(0,0,0,.12); font-size:12px; }
.tt-head { font-size:13px; font-weight:600; color:#1e40af;
            margin-bottom:7px; padding-bottom:6px;
            border-bottom:1px solid #f1f5f9; line-height:1.4; }
.tt-r { display:flex; gap:8px; color:#334155; margin:3px 0; }
.tt-l { color:#94a3b8; min-width:72px; flex-shrink:0; }
.tt-deaths { color:#dc2626; font-size:14px; }
.tt-src { font-size:10px; color:#64748b; margin-top:7px;
           border-top:1px solid #f1f5f9; padding-top:6px;
           line-height:1.5; word-break:break-word; }
.badge { display:inline-block; padding:1px 5px; border-radius:3px;
          font-size:9px; font-weight:700; margin-left:4px; }
.badge-warn  { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
.badge-approx{ background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; }

/* ── Legend ───────────────────────────────────────────────────────── */
#legend { position:absolute; bottom:24px; left:12px; z-index:900;
           background:#ffffffee; border:1px solid #e2e8f0; border-radius:8px;
           padding:12px 14px; min-width:160px;
           box-shadow:0 2px 8px rgba(0,0,0,.08); font-size:11px; }
#legend h4 { font-size:10px; color:#94a3b8; text-transform:uppercase;
              letter-spacing:.1em; margin-bottom:8px; }
.leg { display:flex; align-items:center; gap:8px; margin:4px 0; color:#334155; }
.ld { width:12px; height:12px; border-radius:50%; flex-shrink:0;
        border:1px solid rgba(0,0,0,.15); }

/* ── Stats panel ──────────────────────────────────────────────────── */
#stats { position:absolute; top:12px; right:12px; z-index:900;
          background:#ffffffee; border:1px solid #e2e8f0; border-radius:8px;
          padding:12px 16px; min-width:190px;
          box-shadow:0 2px 8px rgba(0,0,0,.08); }
#stats h4 { font-size:10px; color:#94a3b8; text-transform:uppercase;
             letter-spacing:.1em; margin-bottom:8px; }
.sr { display:flex; justify-content:space-between; gap:16px;
        font-size:12px; margin:4px 0; }
.sv { color:#2563eb; font-weight:700; }
.st { color:#475569; }

/* ── Notes banner ─────────────────────────────────────────────────── */
#notes { position:absolute; bottom:24px; right:12px; z-index:900;
          background:#fffbeb; border:1px solid #fcd34d; border-radius:6px;
          padding:8px 12px; max-width:260px; font-size:10px; color:#78350f;
          box-shadow:0 2px 8px rgba(0,0,0,.06); }
</style>
</head>

// ── Colour helpers ─────────────────────────────────────────────────────────────

const CP = ['#2563eb','#dc2626','#d97706','#059669','#7c3aed',
            '#db2777','#0891b2','#65a30d','#ea580c','#4338ca'];
const DECADE_PALETTE = {
  1960:'#6366f1', 1970:'#0ea5e9', 1980:'#f59e0b',
  1990:'#ef4444', 2000:'#10b981'
};
const CONF_PALETTE = {
  high:'#16a34a', medium:'#ca8a04',
  district_centroid:'#dc2626', manual_centroid:'#9f1239',
  low:'#6b7280', failed:'#374151'
};
function clr(d, mode) {
  if (mode === 'cluster') return d.cluster < 0 ? '#94a3b8' : CP[d.cluster % CP.length];
  if (mode === 'decade')  return DECADE_PALETTE[Math.floor(d.year/10)*10] || '#64748b';
  if (mode === 'confidence') return CONF_PALETTE[d.confidence] || '#64748b';
  return d.cluster < 0 ? '#94a3b8' : CP[d.cluster % CP.length];
}
function radius(d, mode) {
  const base = Math.max(5, Math.min(28, Math.sqrt(d.deaths) * 2.2));
  return mode === 'deaths' ? base * 1.35 : base;
}


// ── Tooltip ───────────────────────────────────────────────────────────────────

function buildTooltip(d) {
  const prec = d.date_prec === 'year_only'   ? ' (year only)'
             : d.date_prec === 'month_known' ? ' (month approx)' : '';
  const ub = d.uncertainty ? '<span class="badge badge-warn">UNCERTAIN</span>' : '';
  const jb = d.jitter      ? '<span class="badge badge-approx">APPROX COORD</span>' : '';
  const dateStr = d.date_prec === 'year_only' ? d.year : d.date;
  return `
    <div class="tt-head">${d.village}, ${d.district} ${ub}${jb}</div>
    <div class="tt-r"><span class="tt-l">Date</span>${dateStr}${prec}</div>
    <div class="tt-r"><span class="tt-l">Aggressor</span>${d.aggressor}</div>
    <div class="tt-r"><span class="tt-l">Group</span>${d.aggressor_grp || '—'}</div>
    <div class="tt-r"><span class="tt-l">Victim</span>${d.victim}</div>
    <div class="tt-r"><span class="tt-l">Deaths</span><strong class="tt-deaths">${d.deaths}</strong></div>
    <div class="tt-r"><span class="tt-l">Cluster</span>${d.cluster >= 0 ? d.cluster_lbl : 'Isolated'}</div>
    <div class="tt-r"><span class="tt-l">Geocode</span>${d.confidence}</div>
    <div class="tt-r"><span class="tt-l">Block</span>${d.block}</div>
    <div class="tt-src"><strong>Source (${d.source_type}):</strong> ${d.source || '—'}</div>`;
}


const ttEl = document.getElementById('tt');
function showTT(e, d) {
  ttEl.innerHTML = buildTooltip(d);
  ttEl.style.display = 'block';
  posTT(e.clientX, e.clientY);
}
document.addEventListener('mousemove', e => {
  if (ttEl.style.display !== 'none') posTT(e.clientX, e.clientY);
});
function posTT(x, y) {
  const off=16, w=ttEl.offsetWidth, h=ttEl.offsetHeight;
  ttEl.style.left = (x+off+w > window.innerWidth  ? x-w-off : x+off)+'px';
  ttEl.style.top  = (y+off+h > window.innerHeight ? y-h-off : y+off)+'px';
}
function hideTT() { ttEl.style.display = 'none'; }

// ── Cluster label helper ──────────────────────────────────────────────────────
function clusterMajorDistrict(c) {
  const inc = DATA.filter(d => d.cluster === c);
  const cnt = {};
  inc.forEach(d => { cnt[d.district] = (cnt[d.district]||0)+1; });
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
}

// ── Layer management ──────────────────────────────────────────────────────────
let mLayer = L.layerGroup().addTo(map);

function redraw() {
  mLayer.clearLayers();
  const mode   = document.getElementById('colorMode').value;
  const yMin   = +document.getElementById('yearMin').value;
  const yMax   = +document.getElementById('yearMax').value;
  const minD   = +document.getElementById('minD').value;

  const visible = DATA.filter(d =>
    d.year >= yMin && d.year <= yMax && d.deaths >= minD
  );

  visible.forEach(d => {
    const r = radius(d, mode);
    const isDashed = d.jitter === 1;
    const m = L.circleMarker([d.lat, d.lon], {
      radius:      r,
      fillColor:   clr(d, mode),
      color:       d.uncertainty ? '#ef4444' : '#ffffff',
      weight:      d.uncertainty ? 1.8 : 1.0,
      fillOpacity: isDashed ? 0.55 : 0.82,
      opacity:     0.9,
      dashArray:   isDashed ? '4 3' : null,
    });
    m.on('mouseover', e => showTT(e.originalEvent, d));
    m.on('mouseout', hideTT);
    m.on('click', () => map.setView([d.lat, d.lon], Math.max(map.getZoom(), 11)));
    m.addTo(mLayer);
  });

  // Stats panel
  const td = visible.reduce((s,d)=>s+d.deaths, 0);
  const byCl = {};
  visible.forEach(d => { byCl[d.district]=(byCl[d.district]||0)+1; });
  const topD = Object.entries(byCl).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([k,v])=>`${k} (${v})`).join(', ');

  document.getElementById('hdr-count').textContent =
    `${visible.length} incidents · ${td} deaths`;

  document.getElementById('stats').innerHTML = `
    <h4>Summary</h4>
    <div class="sr"><span class="st">Shown</span><span class="sv">${visible.length}</span></div>
    <div class="sr"><span class="st">Deaths</span><span class="sv">${td}</span></div>
    <div class="sr"><span class="st">Period</span><span class="sv">${yMin}–${yMax}</span></div>
    <div style="margin-top:8px;font-size:10px;color:#64748b">Top districts:</div>
    <div style="font-size:11px;color:#2563eb">${topD}</div>`;

  // Legend
  const legendEl = document.getElementById('legend');
  if (mode === 'cluster') {
    const clusters = [...new Set(visible.map(d=>d.cluster))].sort();
    legendEl.innerHTML = '<h4>Cluster</h4>' + clusters.map(c => {
      const col = c < 0 ? '#94a3b8' : CP[c % CP.length];
      const lbl = c < 0 ? 'Isolated' : `Cluster ${c}: ${clusterMajorDistrict(c)}`;
      return `<div class="leg"><div class="ld" style="background:${col}"></div>${lbl}</div>`;
    }).join('');
  } else if (mode === 'decade') {
    legendEl.innerHTML = '<h4>Decade</h4>' +
      Object.entries(DECADE_PALETTE).map(([d,c]) =>
        `<div class="leg"><div class="ld" style="background:${c}"></div>${d}s</div>`
      ).join('');
  } else if (mode === 'confidence') {
    legendEl.innerHTML = '<h4>Geocode quality</h4>' +
      Object.entries(CONF_PALETTE).map(([k,c]) =>
        `<div class="leg"><div class="ld" style="background:${c}"></div>${k.replace('_',' ')}</div>`
      ).join('');
  } else {
    legendEl.innerHTML = '<h4>Deaths</h4>' +
      [[5,'<10'],[10,'10–30'],[20,'30–60'],[28,'60+']].map(([r,lbl]) =>
        `<div class="leg"><div class="ld" style="width:${r}px;height:${r}px;background:#94a3b8"></div>${lbl}</div>`
      ).join('');
  }
}

// ── Legend + stats DOM ────────────────────────────────────────────────────────
const legEl = Object.assign(document.createElement('div'), { id:'legend' });
const statsEl = Object.assign(document.createElement('div'), { id:'stats' });
document.getElementById('map').appendChild(legEl);
document.getElementById('map').appendChild(statsEl);

// ── Notes ─────────────────────────────────────────────────────────────────────
const notesEl = Object.assign(document.createElement('div'), { id:'notes' });
document.getElementById('map').appendChild(notesEl);
notesEl.innerHTML = `⚠ Dashed outline = approx. coordinate (district centroid).<br>
Red border = entry with uncertainty flag. Source cited on hover.`;

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('colorMode').addEventListener('change', redraw);
[['yearMin','ymn'],['yearMax','ymx'],['minD','mdn']].forEach(([id,lbl]) => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    document.getElementById(lbl).textContent = el.value;
    redraw();
  });
});

redraw();
</script>
</body>
</html>
